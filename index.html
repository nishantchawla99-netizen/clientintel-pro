<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClientIntel Pro</title>
<style>
:root{--bg:#0d1b2a;--sidebar:#0a1628;--card:#112240;--gold:#c9a84c;--text:#ffffff;--green:#1a3a1a;--purple:#1a1a3a}
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}
body{background:var(--bg);color:var(--text);display:flex;height:100vh}
.sidebar{width:240px;background:var(--sidebar);padding:20px;display:flex;flex-direction:column}
.logo{font-weight:700;font-size:20px;margin-bottom:30px;color:var(--gold)}
.nav-item{padding:12px;border-radius:6px;margin-bottom:8px;cursor:pointer}
.nav-item:hover{background:#112240}
.badge{background:var(--gold);color:black;padding:2px 6px;border-radius:10px;margin-left:6px}
.main{flex:1;display:flex}
.left-panel{width:280px;background:#0f2138;padding:10px;overflow-y:auto}
.right-panel{flex:1;padding:20px;overflow-y:auto}
.card{background:var(--card);padding:12px;border-radius:8px;margin-bottom:10px;cursor:pointer;border-left:3px solid transparent}
.card.active{border-left:3px solid var(--gold)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);color:black;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:10px}
.row{display:flex;align-items:center}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-gold{background:var(--gold);color:black}
.btn-green{background:green;color:white}
.btn-purple{background:purple;color:white}
.tabs{display:flex;margin-bottom:10px}
.tab{margin-right:15px;padding-bottom:5px;cursor:pointer}
.tab.active{border-bottom:2px solid var(--gold)}
input,textarea,select{width:100%;padding:8px;margin-bottom:10px;background:#0d1b2a;border:1px solid #333;color:white;border-radius:4px}
input:focus{border-color:var(--gold);outline:none}
.toast{position:fixed;top:20px;right:20px;background:#222;padding:10px 15px;border-radius:6px;z-index:9999;max-width:300px;word-break:break-word}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:9998}
.modal-content{background:#112240;padding:20px;border-radius:8px;width:320px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #333;padding:6px;text-align:left}
.info-text{font-size:11px;color:#888;margin-bottom:10px}
.info-link{color:var(--gold);text-decoration:none}
.info-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">ClientIntel Pro</div>
  <div class="nav-item">Dashboard</div>
  <div class="nav-item">⭐ Company Intel <span class="badge" id="count">0</span></div>
  <div class="nav-item">Contacts</div>
  <div class="nav-item">Settings</div>
</div>
<div class="main">
  <div class="left-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b>Company Profiles</b>
      <button class="btn btn-gold" onclick="newProfile()">+ New</button>
    </div>
    <div id="profiles">No profiles yet.</div>
  </div>
  <div class="right-panel">
    <div style="display:flex;gap:10px;margin-bottom:15px">
      <button class="btn btn-green" onclick="openGST()">GST Fetch</button>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="form">Select profile</div>
    <br>
    <button class="btn btn-gold" onclick="saveProfile()">Save Profile</button>
  </div>
</div>

<div class="modal" id="gstModal">
  <div class="modal-content">
    <h3>GST Fetch (Free)</h3>
    <div class="info-text">Get free API key: <a href="https://gstincheck.co.in" target="_blank" class="info-link">gstincheck.co.in</a> (20 free requests)</div>
    <input id="gstin" placeholder="GSTIN" aria-label="GSTIN">
    <input id="gstKey" placeholder="API Key from gstincheck.co.in" aria-label="API Key">
    <button class="btn btn-gold" onclick="fetchGST()">Fetch</button>
  </div>
</div>

<script>
let profiles=JSON.parse(localStorage.getItem("clientintel_profiles")||"[]");
let active=null;
let tab="LEGAL";
const tabs=["LEGAL","PRESENCE","FINANCIAL","LEADERSHIP","SPOC","PITCH INTEL","GST RETURNS"];
function renderTabs(){document.getElementById("tabs").innerHTML=tabs.map(t=>`<div class="tab ${t==tab?"active":""}" onclick="tab='${t}';render()">${t}</div>`).join("")}
function renderProfiles(){
  document.getElementById("profiles").innerHTML=profiles.length?profiles.map(p=>`
    <div class="card ${p.id==active?.id?"active":""}" onclick="selectProfile('${p.id}')">
      <div class="row"><div class="avatar">${p.name?.[0]||"?"}</div><div><div>${p.name||"Unnamed"}</div><small>${p.gstin?.slice(0,6)||""}</small></div></div>
    </div>`).join(""):"No profiles yet."
  document.getElementById("count").innerText=profiles.length
}
function renderForm(){
  if(!active){document.getElementById("form").innerHTML="Select profile";return}
  let html="";
  if(tab=="LEGAL"){html+=input("name","Company Name*")+input("gstin","GSTIN*")+input("pan","PAN")+input("trade","Trade Name")+input("address","Address")+input("state","State")}
  if(tab=="LEADERSHIP"){html+=input("ceo","CEO Name")+input("ceo_designation","Designation")+input("ceo_linkedin","LinkedIn")+textarea("leadership_notes","Notes")}
  if(tab=="PITCH INTEL"){html+=textarea("pain","Pain Points")+textarea("benefits","Benefits")}
  if(tab=="GST RETURNS"){html+=`<table><tr><th>FY</th><th>Type</th><th>Status</th></tr>${(active.returns||[]).map(r=>`<tr><td>${r.fy}</td><td>${r.type}</td><td>${r.status}</td></tr>`).join("")}</table>`}
  document.getElementById("form").innerHTML=html
}
function input(key,label){return `<input value="${active[key]||""}" oninput="update('${key}',this.value)" placeholder="${label}">`}
function textarea(key,label){return `<textarea oninput="update('${key}',this.value)" placeholder="${label}">${active[key]||""}</textarea>`}
function update(k,v){active[k]=v;saveLocal()}
function newProfile(){const p={id:Date.now()};profiles.push(p);active=p;saveLocal();render()}
function selectProfile(id){active=profiles.find(p=>p.id==id);render()}
function saveLocal(){localStorage.setItem("clientintel_profiles",JSON.stringify(profiles))}
function saveProfile(){showToast("Saved")}
function showToast(msg){const t=document.createElement("div");t.className="toast";t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),4000)}
function openGST(){gstModal.style.display="flex"}
async function fetchGST(){
  const gstin=document.getElementById("gstin").value.trim();
  const key=document.getElementById("gstKey").value.trim();
  if(!gstin||!key){showToast("Enter GSTIN and API Key");return;}
  if(!active){const p={id:Date.now()};profiles.push(p);active=p;saveLocal();}
  showToast("Fetching GST data...");
  try{
    const res=await fetch(`https://sheet.gstincheck.co.in/check/${key}/${gstin}`);
    const data=await res.json();
    console.log("GST API response:",data);
    if(data.flag && data.data){
      const d=data.data;
      active.name=d.tradeNam||d.lgnm||"";
      active.gstin=gstin;
      active.trade=d.tradeNam||"";
      active.pan=gstin.substring(2,12);
      active.address=d.pradr?.adr||"";
      active.state=d.pradr?.addr?.stcd||"";
      saveLocal();render();
      showToast("GST data filled: "+active.name);
      gstModal.style.display="none";
    } else {
      showToast(data.message||"Failed to fetch. Check GSTIN or API key");
    }
  }catch(e){
    showToast("Error: "+e.message);
    console.error("GST Fetch error:",e);
  }
}
function render(){renderTabs();renderProfiles();renderForm()}
render()
</script>
</body>
</html>
